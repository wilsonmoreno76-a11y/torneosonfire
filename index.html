<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>On Fire Padel - Elite System V1.2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --onfire-orange: #f97316; --onfire-dark: #0f172a; --onfire-card: #1e293b; }
        body { background-color: var(--onfire-dark); color: white; font-family: 'Inter', sans-serif; min-height: 100dvh; }
        .onfire-card { background: var(--onfire-card); border: 1px solid #334155; border-radius: 1rem; }
        .onfire-input { background: #334155; border: 1px solid #475569; color: white; border-radius: 0.5rem; text-align: center; }
        .onfire-btn { background: linear-gradient(135deg, #f97316 0%, #ea580c 100%); font-weight: 800; text-transform: uppercase; border-radius: 0.75rem; transition: transform 0.1s; }
        .onfire-btn:active { transform: scale(0.98); }
        .pista-badge { background: #f97316; color: white; padding: 2px 10px; border-radius: 99px; font-size: 10px; font-weight: 900; }
        .podium-1 { background: linear-gradient(to top, #f97316, #fb923c); height: 120px; width: 80px; }
        .podium-2 { background: linear-gradient(to top, #64748b, #94a3b8); height: 90px; width: 80px; }
        .podium-3 { background: linear-gradient(to top, #78350f, #b45309); height: 70px; width: 80px; }
        .btn-nav:disabled { opacity: 0.3; cursor: not-allowed; }
        #sponsor-link { transition: all 0.5s ease-in-out; }
        .sponsor-banner { background: white; color: #0f172a; border-radius: 1rem; box-shadow: 0 4px 20px rgba(249, 115, 22, 0.3); min-height: 75px; }
        .sponsor-logo { width: 48px; height: 48px; object-fit: contain; }
    </style>
</head>
<body class="p-4 pb-10">
    <header class="text-center mb-4">
        <h1 class="text-3xl font-black italic uppercase tracking-tighter text-white">ON FIRE <span class="text-orange-500">PADEL</span></h1>
        
        <div id="sponsor-space" class="mt-4 max-w-md mx-auto h-[85px]">
            <a id="sponsor-link" href="#" target="_blank" class="block opacity-100 scale-100">
                <div class="sponsor-banner p-3 flex items-center justify-between gap-3">
                    <div class="flex items-center gap-3">
                        <div class="bg-white p-1 rounded-lg">
                            <img id="img-logo" src="" alt="Logo" class="sponsor-logo">
                        </div>
                        <div class="text-left">
                            <p id="sponsor-tag" class="text-[9px] text-orange-600 font-black uppercase leading-none"></p>
                            <p id="sponsor-name" class="text-[14px] font-black uppercase text-slate-900 tracking-tighter"></p>
                        </div>
                    </div>
                    <span id="sponsor-btn" class="text-[10px] bg-orange-500 text-white px-3 py-2 rounded-lg font-black uppercase italic shadow-md animate-pulse"></span>
                </div>
            </a>
        </div>

        <div class="flex flex-col items-center justify-center gap-1 mt-6">
            <a href="https://www.instagram.com/onfirepadel" target="_blank" class="flex items-center gap-2 bg-slate-800/50 px-4 py-1 rounded-full border border-white/10">
                <i class="fab fa-instagram text-orange-500"></i>
                <span class="text-[10px] font-black uppercase tracking-widest text-white">@onfirepadel</span>
            </a>
            <p id="display-torneo-name" class="text-[11px] text-slate-500 font-bold uppercase tracking-[0.2em] mt-2 italic">MODO COMPETICIÓN</p>
        </div>
    </header>

    <section id="setup-section" class="max-w-xl mx-auto space-y-4">
        <div class="onfire-card p-6">
            <div class="mb-4">
                <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase">Nombre del Torneo</label>
                <input type="text" id="input-torneo-name" placeholder="EJ: COPA ON FIRE" class="onfire-input w-full p-3 text-lg font-black uppercase border-orange-500/50">
            </div>
            <div class="grid grid-cols-3 gap-2 mb-4">
                <button id="btn-parejas" onclick="setModo('parejas')" class="py-3 rounded-lg font-bold text-[10px] border-2 border-orange-500 bg-orange-500 text-white">PAREJAS</button>
                <button id="btn-individual" onclick="setModo('individual')" class="py-3 rounded-lg font-bold text-[10px] border-2 border-slate-700 text-white uppercase">Individual</button>
                <button id="btn-pozo" onclick="setModo('pozo')" class="py-3 rounded-lg font-bold text-[10px] border-2 border-slate-700 text-white uppercase">Sube/Baja</button>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div><label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase">Total Equipos</label><input type="number" id="num-total" placeholder="8" oninput="crearInputsNombres()" class="onfire-input w-full p-3 text-xl font-black"></div>
                <div><label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase">Canchas</label><input type="number" id="pistas-limit" placeholder="4" class="onfire-input w-full p-3 text-xl font-black text-orange-500"></div>
            </div>
        </div>
        <div id="grid-nombres" class="grid grid-cols-2 gap-2"></div>
        <button onclick="iniciarTorneo()" class="onfire-btn w-full py-5 text-xl shadow-lg shadow-orange-500/20 text-white">GENERAR TORNEO 🔥</button>
    </section>

    <section id="tournament-section" class="hidden max-w-2xl mx-auto space-y-6">
        <div class="flex items-center justify-between gap-2">
            <button onclick="cambiarRonda(-1)" id="btn-prev" class="bg-slate-800 p-4 rounded-xl font-bold btn-nav"><i class="fas fa-chevron-left"></i></button>
            <div id="label-ronda" class="bg-orange-600 flex-1 text-center py-4 rounded-xl font-black text-xl italic uppercase">RONDA 1</div>
            <button onclick="cambiarRonda(1)" id="btn-next" class="bg-slate-800 p-4 rounded-xl font-bold btn-nav"><i class="fas fa-chevron-right"></i></button>
        </div>
        <div id="pistas-container" class="space-y-4"></div>
        
        <div id="podio-visual" class="onfire-card p-6 text-center">
            <div class="flex items-end justify-center gap-2">
                <div class="flex flex-col items-center"><span id="name-2" class="text-[10px] font-bold mb-2 w-20 truncate uppercase text-white">---</span><div class="podium-2 rounded-t-lg flex items-center justify-center text-2xl font-black text-white">2</div></div>
                <div class="flex flex-col items-center"><span id="name-1" class="text-[12px] font-black mb-2 text-orange-500 w-24 truncate uppercase">---</span><div class="podium-1 rounded-t-lg flex items-center justify-center text-4xl font-black text-white">1</div></div>
                <div class="flex flex-col items-center"><span id="name-3" class="text-[10px] font-bold mb-2 w-20 truncate uppercase text-white">---</span><div class="podium-3 rounded-t-lg flex items-center justify-center text-2xl font-black text-white">3</div></div>
            </div>
        </div>

        <div class="onfire-card p-4">
            <div id="lista-ranking" class="space-y-2 mb-6 text-sm font-bold text-white"></div>
            <div class="grid grid-cols-2 gap-2">
                <button onclick="shareWhatsApp()" class="bg-green-600 p-3 rounded-lg font-black text-[11px] uppercase text-white">WhatsApp</button>
                <button onclick="confirmarReinicio()" class="bg-slate-700 p-3 rounded-lg font-black text-[11px] uppercase text-slate-400">Reiniciar</button>
            </div>
        </div>
    </section>

    <script>
        const MIS_SPONSORS = [
            { nombre: "Kukuruz Gourmet", tag: "Aliado Oficial", logo: "https://raw.githubusercontent.com/wilsonmoreno76-a11y/torneosonfire/principal/logok.png", link: "https://wa.me/573193490940", btn: "PEDIR AQUÍ 🌽", mensajeWA: "Post-partido en Kukuruz Gourmet 🌽" },
            { nombre: "Tienda de Padel", tag: "Amazon Influencer", logo: "https://cdn-icons-png.flaticon.com/512/3163/3163636.png", link: "https://www.amazon.com/shop/onfirepadel/list/3GFU63HCITYBZ", btn: "VER OFERTAS 🔥", mensajeWA: "Equípate en mi tienda de Amazon Padel 🚀" }
        ];

        let indexSponsor = 0;
        let state = { nombreTorneo: '', modo: 'parejas', jugadores: [], ronda: 1, pistasMax: 3, partidos: {}, activo: false, pozoMapping: [] };

        function rotarSponsor() {
            const link = document.getElementById('sponsor-link');
            if(!link) return;
            link.style.opacity = '0';
            setTimeout(() => {
                const s = MIS_SPONSORS[indexSponsor];
                document.getElementById('img-logo').src = s.logo;
                document.getElementById('sponsor-name').innerText = s.nombre;
                document.getElementById('sponsor-tag').innerText = s.tag;
                document.getElementById('sponsor-btn').innerText = s.btn;
                document.getElementById('sponsor-link').href = s.link;
                link.style.opacity = '1';
                indexSponsor = (indexSponsor + 1) % MIS_SPONSORS.length;
            }, 500);
        }

        function setModo(m) { 
            state.modo = m; 
            ['btn-parejas', 'btn-individual', 'btn-pozo'].forEach(id => {
                const btn = document.getElementById(id);
                const isSelected = id.includes(m);
                btn.className = isSelected ? 'py-3 rounded-lg font-bold text-[10px] border-2 border-orange-500 bg-orange-500 text-white' : 'py-3 rounded-lg font-bold text-[10px] border-2 border-slate-700 text-white uppercase';
            });
            crearInputsNombres(); 
        }

        function crearInputsNombres() {
            const n = parseInt(document.getElementById('num-total').value);
            const grid = document.getElementById('grid-nombres');
            if(!n) return; grid.innerHTML = ''; state.jugadores = [];
            for(let i=0; i<n; i++) {
                let def = state.modo === 'pozo' || state.modo === 'parejas' ? `PAREJA ${i+1}` : `JUGADOR ${i+1}`;
                state.jugadores.push({ id: i, nombre: def, pts: 0, wins: 0 });
                grid.innerHTML += `<input type="text" placeholder="${def}" oninput="updateNombre(${i}, this.value)" class="onfire-input p-3 text-[10px] font-bold uppercase">`;
            }
        }

        function updateNombre(id, val) { state.jugadores[id].nombre = val.toUpperCase(); saveLocal(); }

        function iniciarTorneo() {
            state.nombreTorneo = document.getElementById('input-torneo-name').value.toUpperCase() || 'DIGITAL BOARD';
            state.pistasMax = parseInt(document.getElementById('pistas-limit').value) || 3;
            state.activo = true;
            if(state.modo === 'pozo') state.pozoMapping = state.jugadores.map(j => j.id);
            document.getElementById('display-torneo-name').innerText = state.nombreTorneo;
            document.getElementById('setup-section').classList.add('hidden');
            document.getElementById('tournament-section').classList.remove('hidden');
            renderRonda(); saveLocal();
        }

        function renderRonda() {
            const container = document.getElementById('pistas-container');
            container.innerHTML = '';
            document.getElementById('label-ronda').innerText = `RONDA ${state.ronda}`;
            
            let matches = [];
            if(state.modo === 'pozo') {
                for(let i=0; i < state.pistasMax * 2; i += 2) {
                    if(state.pozoMapping[i] !== undefined && state.pozoMapping[i+1] !== undefined) {
                        matches.push({ t1: [state.pozoMapping[i]], t2: [state.pozoMapping[i+1]] });
                    }
                }
            } else {
                let ids = state.jugadores.map(j => j.id); if(ids.length % 2 !== 0) ids.push(-1);
                let rotated = [ids[0], ...rotateArray(ids.slice(1), state.ronda - 1)];
                let pairings = [];
                for(let i=0; i<rotated.length/2; i++) {
                    let a = rotated[i], b = rotated[rotated.length-1-i];
                    if(a !== -1 && b !== -1) pairings.push([a, b]);
                }
                matches = state.modo === 'individual' ? [] : pairings.map(p => ({t1:[p[0]], t2:[p[1]]}));
                if(state.modo === 'individual') {
                    for(let i=0; i<pairings.length; i+=2) if(i+1 < pairings.length) matches.push({t1:pairings[i], t2:pairings[i+1]});
                }
            }

            matches.slice(0, state.pistasMax).forEach((m, idx) => {
                const key = `r${state.ronda}c${idx}`;
                if(!state.partidos[key]) state.partidos[key] = {s1:0, s2:0};
                const val1 = state.partidos[key].s1 || '';
                const val2 = state.partidos[key].s2 || '';
                container.innerHTML += `<div class="onfire-card p-4 border-l-4 border-orange-500 relative"><span class="pista-badge absolute -top-2 left-4 font-black">CANCHA ${idx+1}</span><div class="flex items-center gap-2 mt-2"><div class="flex-1 text-right font-black text-[10px] uppercase text-white">${m.t1.map(id=>state.jugadores[id].nombre).join("/")}</div><div class="flex gap-1"><input type="number" value="${val1}" oninput="saveScore('${key}',1,this.value,${JSON.stringify(m.t1)},${JSON.stringify(m.t2)})" class="onfire-input w-10 h-10 font-black text-orange-500"><input type="number" value="${val2}" oninput="saveScore('${key}',2,this.value,${JSON.stringify(m.t1)},${JSON.stringify(m.t2)})" class="onfire-input w-10 h-10 font-black text-orange-500"></div><div class="flex-1 text-left font-black text-[10px] uppercase text-white">${m.t2.map(id=>state.jugadores[id].nombre).join("/")}</div></div></div>`;
            });
            updateRanking();
        }

        function saveScore(k, t, v, i1, i2) { 
            state.partidos[k][`s${t}`] = parseInt(v)||0; 
            state.partidos[k].ids1 = i1; 
            state.partidos[k].ids2 = i2; 
            updateRanking(); saveLocal(); 
        }

        function cambiarRonda(v) {
            if(v > 0 && state.modo === 'pozo') procesarSubeBaja();
            state.ronda += v; renderRonda(); window.scrollTo(0,0);
        }

        function procesarSubeBaja() {
            let nextMapping = [...state.pozoMapping];
            for(let i=0; i < state.pistasMax; i++) {
                const key = `r${state.ronda}c${i}`;
                const p = state.partidos[key];
                if(!p) continue;
                const idxT1 = i * 2; const idxT2 = i * 2 + 1;
                const winT1 = p.s1 > p.s2;
                if(i === 0) { // Cancha 1
                    if(!winT1) [nextMapping[idxT1], nextMapping[idxT2+1]] = [nextMapping[idxT2+1], nextMapping[idxT1]];
                } else if (i === state.pistasMax - 1) { // Última cancha
                    if(winT1) [nextMapping[idxT1], nextMapping[idxT1-1]] = [nextMapping[idxT1-1], nextMapping[idxT1]];
                    else [nextMapping[idxT2], nextMapping[idxT2-2]] = [nextMapping[idxT2-2], nextMapping[idxT2]];
                } else { // Canchas intermedias
                    if(winT1) [nextMapping[idxT1], nextMapping[idxT1-1]] = [nextMapping[idxT1-1], nextMapping[idxT1]];
                    else [nextMapping[idxT2], nextMapping[idxT2+1]] = [nextMapping[idxT2+1], nextMapping[idxT2]];
                }
            }
            state.pozoMapping = nextMapping;
        }

        function updateRanking() {
            state.jugadores.forEach(j => { j.pts = 0; j.wins = 0; });
            Object.values(state.partidos).forEach(p => { 
                if(p.ids1){ 
                    p.ids1.forEach(id => state.jugadores[id].pts += p.s1); 
                    p.ids2.forEach(id => state.jugadores[id].pts += p.s2);
                    if(p.s1 > p.s2) p.ids1.forEach(id => state.jugadores[id].wins++);
                    else if(p.s2 > p.s1) p.ids2.forEach(id => state.jugadores[id].wins++);
                }
            });
            const sorted = [...state.jugadores].sort((a,b) => b.wins - a.wins || b.pts - a.pts);
            document.getElementById('lista-ranking').innerHTML = sorted.map((j, i) => `<div class="flex justify-between p-2 rounded ${i%2===0?'bg-slate-800/30':''}"><span>${i+1}. ${j.nombre} (${j.wins} PG)</span><span class="text-orange-500 font-black">${j.pts}</span></div>`).join("");
            if(sorted[0]) document.getElementById('name-1').innerText = sorted[0].nombre;
            if(sorted[1]) document.getElementById('name-2').innerText = sorted[1].nombre;
            if(sorted[2]) document.getElementById('name-3').innerText = sorted[2].nombre;
        }

        function rotateArray(arr, k) { k = k % arr.length; return arr.slice(k).concat(arr.slice(0, k)); }
        function saveLocal() { localStorage.setItem('onfire_state', JSON.stringify(state)); }
        function confirmarReinicio() { if(confirm("¿Reiniciar?")) { localStorage.removeItem('onfire_state'); location.reload(); } }
        function loadLocal() {
            const saved = localStorage.getItem('onfire_state');
            if(saved) {
                const parsed = JSON.parse(saved);
                if(parsed.activo && confirm("¿Recuperar torneo?")) { state = parsed; iniciarTorneo(); }
            }
        }
        function shareWhatsApp() {
            const sorted = [...state.jugadores].sort((a,b) => b.wins - a.wins || b.pts - a.pts);
            let msg = `🔥 *${state.nombreTorneo}* 🔥%0A%0A`;
            sorted.slice(0, 10).forEach((j, i) => { msg += `${i+1}. *${j.nombre}*: ${j.wins} Victories / ${j.pts} pts%0A`; });
            window.open(`https://wa.me/?text=${msg}`);
        }

        window.onload = () => { rotarSponsor(); setInterval(rotarSponsor, 6000); loadLocal(); };
    </script>
</body>
</html>
